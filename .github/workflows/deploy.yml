name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch certificate PDFs (private repo)
        env:
          CERTS_REPO: ${{ secrets.PORTFOLIO_CERTS_REPO }}
          CERTS_TOKEN: ${{ secrets.PORTFOLIO_CERTS_TOKEN }}
        run: |
          if [ -z "$CERTS_REPO" ] || [ -z "$CERTS_TOKEN" ]; then
            echo "Skipping certificate fetch (secrets not configured)."
            exit 0
          fi
          mkdir -p public/certificates
          git clone --depth 1 "https://x-access-token:${CERTS_TOKEN}@github.com/${CERTS_REPO}.git" /tmp/portfolio-certs
          cp /tmp/portfolio-certs/*.pdf public/certificates/ || true
          ls -la public/certificates/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
